{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — EV Concierge</title>
    <link rel="stylesheet" href="{% static 'property_manager/css/style.css' %}">
</head>
<body>
<div class="login-page">
    <div class="login-card">
        <div class="logo">
            <h1><span>EV</span> Concierge</h1>
            <p>Property Manager Portal</p>
        </div>

        {% if form.errors %}
        <div class="login-error">
            Invalid username or password. Please try again.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" class="form-input"
                       placeholder="Enter your username" autocomplete="username" autofocus required>
            </div>
            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" class="form-input"
                       placeholder="Enter your password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary">Sign In</button>
            {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
            {% endif %}
        </form>
    </div>
</div>
</body>
</html>
